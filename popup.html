<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Manager</title>
    <link rel="stylesheet" href="src/styles.css">
    <script src="src/theme-bootstrap.js"></script>
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <header class="hero compact">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Chrome Tabs</p>
            <h1>标签整理台</h1>
          </div>
          <div id="themeToggle" class="theme-toggle theme-toggle--icons" role="tablist" aria-label="主题">
            <button type="button" data-theme="light" role="tab" aria-selected="false" title="浅色" aria-label="浅色">☀</button>
            <button type="button" data-theme="dark" role="tab" aria-selected="false" title="深色" aria-label="深色">☾</button>
            <button type="button" data-theme="system" role="tab" aria-selected="false" title="跟随系统" aria-label="跟随系统">◐</button>
          </div>
        </div>
        <button id="openDashboard" class="hero-stats" title="打开完整管理页" aria-label="打开完整管理页">
          <span class="hero-stat">
            <strong id="windowCount">…</strong>
            <span>窗口</span>
          </span>
          <span class="hero-stat__divider" aria-hidden="true"></span>
          <span class="hero-stat">
            <strong id="tabCount">…</strong>
            <span>标签</span>
          </span>
          <span class="hero-stats__chevron" aria-hidden="true">›</span>
        </button>
      </header>

      <section class="actions">
        <div class="quick-actions">
          <button id="saveAll" class="action-button">
            <span class="action-button__label">保存所有窗口</span>
            <span class="action-button__spinner" aria-hidden="true"></span>
            <span class="action-button__check" aria-hidden="true">✓</span>
          </button>
          <button id="saveCurrentWindow" class="action-button">
            <span class="action-button__label">保存当前窗口</span>
            <span class="action-button__spinner" aria-hidden="true"></span>
            <span class="action-button__check" aria-hidden="true">✓</span>
          </button>
        </div>
        <button id="discardAll" class="action-button action-button--ghost">
          <span class="action-button__label">释放所有标签内存</span>
          <span class="action-button__spinner" aria-hidden="true"></span>
          <span class="action-button__check" aria-hidden="true">✓</span>
        </button>
      </section>

      <section class="snapshot-section">
        <div class="snapshot-section__head">
          <h2>快照</h2>
          <span id="snapshotCount" class="muted"></span>
        </div>
        <div id="snapshotList" class="snapshot-list"></div>
      </section>
    </main>
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
