<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Manager</title>
    <link rel="stylesheet" href="src/styles.css">
    <script>
      // No-flash theme bootstrap: apply the OS preference synchronously
      // before first paint. The module script will refine this from
      // chrome.storage.local once it loads.
      (function () {
        try {
          var mq = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");
          var prefersDark = mq && mq.matches;
          document.documentElement.dataset.themeBootstrap = prefersDark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.themeBootstrap = "light";
        }
      })();
    </script>
  </head>
  <body class="popup-body">
    <main class="popup-shell">
      <header class="hero compact">
        <div class="hero-row">
          <div>
            <p class="eyebrow">Chrome Tabs</p>
            <h1>标签整理台</h1>
          </div>
          <div id="themeToggle" class="theme-toggle theme-toggle--icons" role="tablist" aria-label="主题">
            <button type="button" data-theme="light" role="tab" aria-selected="false" title="浅色" aria-label="浅色">☀</button>
            <button type="button" data-theme="dark" role="tab" aria-selected="false" title="深色" aria-label="深色">☾</button>
            <button type="button" data-theme="system" role="tab" aria-selected="false" title="跟随系统" aria-label="跟随系统">◐</button>
          </div>
        </div>
        <p id="summary" class="muted">正在读取标签…</p>
      </header>

      <section class="actions">
        <button id="openDashboard" class="primary">打开完整管理页</button>

        <section class="action-group">
          <h2 class="action-group__title">释放内存</h2>
          <button id="discardAll" class="action-button">
            <span class="action-button__label">释放所有标签内存</span>
            <span class="action-button__spinner" aria-hidden="true"></span>
            <span class="action-button__check" aria-hidden="true">✓</span>
          </button>
          <button id="discardOld" class="action-button">
            <span class="action-button__label">释放旧标签内存</span>
            <span class="action-button__spinner" aria-hidden="true"></span>
            <span class="action-button__check" aria-hidden="true">✓</span>
          </button>
        </section>

        <section class="action-group">
          <h2 class="action-group__title">保存与恢复</h2>
          <button id="saveAll" class="action-button">
            <span class="action-button__label">保存当前所有标签</span>
            <span class="action-button__spinner" aria-hidden="true"></span>
            <span class="action-button__check" aria-hidden="true">✓</span>
          </button>
          <button id="restoreAll" class="action-button">
            <span class="action-button__label">恢复所有标签</span>
            <span class="action-button__spinner" aria-hidden="true"></span>
            <span class="action-button__check" aria-hidden="true">✓</span>
          </button>
          <div id="snapshotList" class="snapshot-list" hidden></div>
        </section>
      </section>
    </main>
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
