<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chrome Tab Manager</title>
    <link rel="stylesheet" href="src/styles.css">
    <script src="src/theme-bootstrap.js"></script>
  </head>
  <body data-mode="by-age">
    <main class="dashboard-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Chrome History Tab Manager</p>
          <h1>整理当前打开的标签</h1>
          <p id="dashboardSummary" class="muted">正在读取标签…</p>
        </div>
        <div class="hero-actions">
          <div id="modeToggle" class="mode-toggle" role="tablist" aria-label="排列模式">
            <button type="button" data-mode="by-age" role="tab" aria-selected="true">按时间</button>
            <button type="button" data-mode="by-window" role="tab" aria-selected="false">按窗口</button>
          </div>
          <div id="themeToggle" class="theme-toggle" role="tablist" aria-label="主题">
            <button type="button" data-theme="light" role="tab" aria-selected="false" title="浅色">浅</button>
            <button type="button" data-theme="dark" role="tab" aria-selected="false" title="深色">深</button>
            <button type="button" data-theme="system" role="tab" aria-selected="false" title="跟随系统">自</button>
          </div>
          <button id="refresh">刷新</button>
        </div>
      </header>

      <section class="toolbar">
        <input id="search" type="search" placeholder="搜索标题或 URL">
        <select id="windowFilter" aria-label="窗口范围">
          <option value="all">全部窗口</option>
          <option value="current">当前窗口</option>
        </select>
        <label class="inline-check">
          <input id="includeExtensionTabs" type="checkbox">
          包含扩展页面
        </label>
      </section>

      <section class="bulk-panel">
        <div class="selection-actions">
          <label class="inline-check">
            <input id="selectVisible" type="checkbox">
            选择可见
          </label>
          <label class="inline-check">
            <input id="selectAll" type="checkbox">
            选择全部
          </label>
        </div>
        <div class="bookmark-controls">
          <select id="bookmarkMode" aria-label="收藏模式">
            <option value="folder">放进一个文件夹</option>
            <option value="flat">平铺到书签栏</option>
            <option value="grouped">按分组建文件夹</option>
          </select>
          <input id="folderName" type="text" placeholder="文件夹名（可选）">
        </div>
        <div class="bulk-actions">
          <button id="saveSelected">保存选中</button>
          <button id="bookmarkSelected">收藏选中</button>
          <button id="discardSelected">释放内存</button>
          <button id="closeSelected" class="danger">关闭选中</button>
        </div>
        <div class="move-controls" data-mode-only="by-window">
          <select id="moveSelectedTo" aria-label="目标窗口"></select>
          <button id="moveSelected">移动选中…</button>
        </div>
      </section>

      <section id="tabGroups" class="tab-groups"></section>
    </main>
    <script type="module" src="src/dashboard.js"></script>
  </body>
</html>
